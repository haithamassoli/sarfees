<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Serfees: S-shaped road connecting two stops (a governorate pair) -->
  <defs>
    <linearGradient id="tile" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2d7b48"/>
      <stop offset="1" stop-color="#0d4f28"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#tile)"/>
  <!-- road: wide casing -->
  <path d="M160 372 C 320 372, 192 140, 352 140"
        fill="none" stroke="#0a3d20" stroke-width="84" stroke-linecap="round"/>
  <!-- dashed lane line -->
  <path d="M160 372 C 320 372, 192 140, 352 140"
        fill="none" stroke="#f8f5ef" stroke-width="13" stroke-linecap="round"
        stroke-dasharray="1 50"/>
  <!-- origin stop -->
  <circle cx="160" cy="372" r="33" fill="#f8f5ef"/>
  <circle cx="160" cy="372" r="14" fill="#0d4f28"/>
  <!-- destination stop -->
  <circle cx="352" cy="140" r="33" fill="#f3c76c"/>
  <circle cx="352" cy="140" r="14" fill="#0d4f28"/>
</svg>
